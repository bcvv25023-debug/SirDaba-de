name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # يخليك تشغله يدوياً من GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. كاش Gradle لتسريع البناء
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. منح صلاحية التنفيذ لـ gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. بناء Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. رفع Debug APK كـ artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SirDabaDelivery-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ===== بناء Release APK (يحتاج Keystore) =====
  build-release:
    runs-on: ubuntu-latest
    # يشتغل بس إذا عندك Secrets مضافة في GitHub
    if: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # فك تشفير الـ Keystore من Secrets
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

      # بناء Release APK موقّع
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SirDabaDelivery-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
